<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style/main.css">

  <style>
    .ex {
      width: 20px;
      height: 150px;
      background-color: red;
      position: absolute;
      left: 0;
      top: 50%;
      border-radius: 10px;
      animation: anim 15s linear infinite;
      transform: translate(-50%, -50%);
    }


    @keyframes anim {
      0% {
        left: 0;
        height: 150px;
        background-color: red;
      }

      12.5% {
        height: 50px;
      }

      25% {
        height: 150px;
        background-color: rgb(0, 30, 255);
      }

      37.5% {
        height: 50px;
      }

      50% {
        height: 150px;
        background-color: red;
      }

      62.5% {
        height: 50px;
      }

      75% {
        height: 150px;
        background-color: rgb(0, 30, 255);
      }

      87.5% {
        height: 50px;
      }

      100% {
        left: 100%;
        height: 150px;
        background-color: red;
      }

    }
  </style>

</head>

<body>
  <div class="ex"></div>
  <div class="ex" style="animation-delay: 0.6s ;"></div>
  <div class="ex" style="animation-delay: 1.2s ;"></div>
  <div class="ex" style="animation-delay: 1.8s ;"></div>
  <div class="ex" style="animation-delay: 2.4s ;"></div>
  <div class="ex" style="animation-delay: 3s ;"></div>
  <div class="ex" style="animation-delay: 3.6s ;"></div>
  <div class="ex" style="animation-delay: 4.2s ;"></div>
</body>

</html>
